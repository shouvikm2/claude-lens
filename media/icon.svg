<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#1a1a2e"/>
  <!-- Hexagon outline (⬡ symbol) -->
  <polygon
    points="64,12 104,36 104,92 64,116 24,92 24,36"
    fill="none"
    stroke="#7c6af7"
    stroke-width="6"
    stroke-linejoin="round"
  />
  <!-- Dollar sign -->
  <text
    x="64" y="80"
    font-family="monospace, sans-serif"
    font-size="52"
    font-weight="bold"
    fill="#7c6af7"
    text-anchor="middle"
  >$</text>
</svg>
